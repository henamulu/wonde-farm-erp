# =============================================================================
# infra/mosquitto/mosquitto.conf
# =============================================================================
# Minimal config for IoT device ingestion. Swap to TLS (port 8883) once
# you have certs — leaving plain 1883 open to the internet is fine for
# local dev only.
# =============================================================================

# --- Logging ---
log_dest stdout
log_type error
log_type warning
log_type notice
connection_messages true

# --- Persistence ---
persistence true
persistence_location /mosquitto/data/

# --- Listeners ---
listener 1883 0.0.0.0
allow_anonymous false
password_file /mosquitto/config/passwd

# Once you have TLS certs:
# listener 8883 0.0.0.0
# cafile     /mosquitto/config/certs/ca.crt
# certfile   /mosquitto/config/certs/server.crt
# keyfile    /mosquitto/config/certs/server.key
# require_certificate true
# use_identity_as_username true

# --- Limits ---
max_connections -1
max_queued_messages 1000
message_size_limit 65536

# --- ACL ---
# Per-tenant topic isolation lives in an ACL file; for now allow authenticated
# users to publish under their own prefix:
#   farm-erp/<tenant_id>/sensor/<device_id>/...
# acl_file /mosquitto/config/acl
