# =============================================================================
# .github/workflows/deploy.yml
# =============================================================================

name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository }}

jobs:

  build:
    name: Build ${{ matrix.service }}
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: api
            dockerfile: ./apps/api/Dockerfile
            context: .
    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tag
        id: meta
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          echo "tag=$SHORT_SHA" >> $GITHUB_OUTPUT
          echo "image=${{ env.IMAGE_PREFIX }}/${{ matrix.service }}" >> $GITHUB_OUTPUT

      - name: Build & push
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64
          push: true
          tags: |
            ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.tag }}
            ${{ steps.meta.outputs.image }}:latest
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,scope=${{ matrix.service }},mode=max
          provenance: false

  deploy:
    name: Deploy to Hetzner
    runs-on: ubuntu-24.04
    needs: build
    timeout-minutes: 15

    steps:
      - name: Compute image tag
        id: meta
        run: echo "tag=$(echo "${{ github.sha }}" | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: SSH deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: ${{ secrets.HETZNER_USER }}
          key: ${{ secrets.HETZNER_SSH_KEY }}
          port: ${{ secrets.HETZNER_SSH_PORT || 22 }}
          script_stop: true
          script: |
            set -euo pipefail
            cd /opt/wonde-farm-erp

            export TAG="${{ steps.meta.outputs.tag }}"
            export API_IMAGE=ghcr.io/${{ github.repository }}/api

            echo "-> pulling api:${TAG}"
            docker compose pull api

            echo "-> running migrations"
            docker compose --profile migrate run --rm api-migrate || echo "WARN: migrate skipped (service may not exist yet)"

            echo "-> rolling api"
            docker compose up -d api

            echo "-> pruning old images"
            docker image prune -f

            echo "-> verifying health"
            for i in 1 2 3 4 5 6; do
              if curl -fsS http://localhost:3000/health > /dev/null 2>&1; then
                echo "api healthy"; break
              fi
              echo "waiting for api... ($i/6)"; sleep 5
              if [ $i -eq 6 ]; then echo "api failed health check"; exit 1; fi
            done

      - name: Notify rollback hint on failure
        if: failure()
        run: |
          echo "::warning::Deploy failed. To roll back, SSH and run:"
          echo "  cd /opt/wonde-farm-erp && export TAG=<previous-sha> && docker compose up -d"
