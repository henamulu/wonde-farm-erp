# =============================================================================
# .github/workflows/ci.yml
# =============================================================================
# Runs on every PR and every push to main.
# =============================================================================

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:

  # ---------------------------------------------------------------------------
  # Lint + typecheck
  # ---------------------------------------------------------------------------
  lint:
    name: Lint & typecheck
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Prettier check
        run: npx prettier --check "**/*.{ts,tsx,md,yml,yaml}" || echo "::warning::Prettier check failed (non-blocking for now)"
        continue-on-error: true

      - name: ESLint
        run: npm run lint || echo "::warning::ESLint failed (non-blocking for now)"
        continue-on-error: true

      - name: Typecheck
        run: npm run build --workspace=apps/api
